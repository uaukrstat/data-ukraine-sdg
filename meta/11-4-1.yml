SDG_GOAL: 11 Sustainable development of cities and communities
SDG_TARGET: 11.4 Increasing the resilience of settlements and territorial communities to the consequences of the armed aggression of the Russian Federation against Ukraine, natural disasters, extraordinary situations and climate change
SDG_INDICATOR: 11.4.1 Share of the population aware of the rules of conduct in emergency situations, percent
CONTACT_ORGANISATION: State Emergency Service of Ukraine (SESU)
UNIT_MEASURE: Percent (%)
REC_USE_LIM: '2015–2022: Data have been developed since 2023. <br> 2023–2024: Data on the present population of Ukraine (by estimate) as of January 1, 2022 were used in the calculation. <br> Territorial communities: Data are not being developed. <br> Luhansk region: Information is provided excluding the calculations of the Luhansk region due to the temporary occupation of this region since 2022.'
