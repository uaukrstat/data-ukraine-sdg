for 2016-2023 − National report on the quality of drinking water and the state of drinking water supply and drainage in Ukraine (next - National Report) in the corresponding year. <br>Urban population: Data for 2015-2019 are provided for the security of urban settlements. Data for 2020-2023 are provided for the security of the urban population (including the population of urban-type settlements). <br>Rural population: Data for 2015-2019 are provided for the security of rural settlements. Data for 2020-2023 are provided for the security of the rural population. <br>Age groups: Disaggregation by age groups is not carried out by the Ministry for Communities, Territories and Infrastructure Development (data are lacking in the National Report). <br>Type of residence: Excluding the temporarily occupied territory of the Autonomous Republic of Crimea and the city of Sevastopol. Data on the present population of Ukraine (by estimate) were used in the calculation. <br>2015-2020: Data are provided excluding information from the temporarily occupied territory of Luhansk and Donetsk regions. <br>2021: Data are provided excluding information from Volyn, Zaporizhzhya, Luhansk, Kherson regions and the temporarily occupied part of Donetsk region. <br>2022-2023: Data are provided excluding information of Luhansk region (according to information of the National Report for 2023).'
