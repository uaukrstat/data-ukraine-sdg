SDG_GOAL: 6 Clean water and sanitation
SDG_TARGET: 6.1 Ensuring access of the population to centralized drinking water supply services of adequate quality
SDG_INDICATOR: 6.1.4 Structure of drinking water consumption among the population by supply methods, percent
UNIT_MEASURE: Percent (%)
CONTACT_ORGANISATION: Ministry for Development of Communities and Territories of Ukraine
REC_USE_LIM: 'Data source: <br> for 2015 – reporting of the Ministry for Communities and Territories Development of Ukraine, whose legal successor is the Ministry for Communities, Territories and Infrastructure Development of Ukraine; <br> for 2016–2023 – National report on the quality of drinking water and the state of drinking water supply and drainage in Ukraine (next – National Report) in the corresponding year. <br> Centralized water supply in urban areas: Data for 2015–2019 are provided for the security of urban settlements. Data for 2020–2023 are provided for the security of the urban population (including the population of urban-type settlements). <br> Centralized water supply in rural areas: Data for 2015–2019 are provided for the security of rural settlements. Data for 2020–2023 are provided for the security of the rural population. <br> Type of residence: Excluding the temporarily occupied territory of the Autonomous Republic of Crimea and the city of Sevastopol. Data on the present
  population of Ukraine (by estimate) were used in the calculation. <br> 2015–2020: Data are provided excluding information from the temporarily occupied territory of Luhansk and Donetsk regions. <br> 2021: Data are provided excluding information from Volyn, Zaporizhzhya, Luhansk, Kherson regions and the temporarily occupied part of Donetsk region. <br>2022–2023: Data are provided excluding information of Luhansk region (according to information of the National Report for 2023). <br> Urban and rural areas for 2022: Data on the present population of Ukraine (by estimate) as of January 1, 2022 were used in the calculation.'
footer_fields:
- label: Target values of the indicator for 2030
  value: centralized water supply – 80, non-centralized water supply – 20
