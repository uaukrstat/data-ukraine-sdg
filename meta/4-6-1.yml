SDG_GOAL: 4 Quality education
SDG_TARGET: 4.6 Creating a modern inclusive educational environment in educational institutions
SDG_INDICATOR: 4.6.1 Share of pre-school, general secondary and extracurricular educational institutions with access to high-speed Internet, percent
UNIT_MEASURE: "Percent (%)"
CONTACT_ORGANISATION: "State Scientific Institution \"Institute of Educational Analytics\" (SSI \"IEA\")"
REC_USE_LIM: 'Pre-school educational institutions with broadband wired high-speed (more than 30 Mbit/s) access to the Internet, pre-school educational institutions with high-speed (more than 30 Mbit/s) wireless access to the Internet, pre-school educational institutions with high-speed (more than 30 Mbit/s) wired or wireless access to the Internet: Data have been developed since 2022. <br> General secondary educational institutions with broadband wired high-speed (more than 30 Mbit/s) access to the Internet, general secondary educational institutions with high-speed (more than 30 Mbit/s) wireless access to the Internet: Data have been developed since 2018. <br> General secondary educational institutions with high-speed (more than 30 Mbit/s) wired or wireless access to the Internet: Data have been developed since 2024. <br> Extracurricular educational institutions: Data were not calculated due to the lack of information on the connection of extracurricular educational institutions to the Internet in reporting form No. 1-PZ "Consolidated report of extracurricular educational institutions".'
