SDG_GOAL: 3 Healthy lives and well-being
SDG_TARGET: 3.5 Reducing premature mortality from non-communicable diseases
SDG_INDICATOR: 3.5.6 Mortality rate from malignant neoplasms of the trachea, bronchi and lungs aged 30–59 years, per 100,000 persons of the corresponding age
