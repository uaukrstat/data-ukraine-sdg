SDG_GOAL: 4 Quality education
SDG_TARGET: 4.2 Ensuring access to quality general secondary education for children and adolescents
SDG_INDICATOR: 4.2.2 Share of general secondary education seekers aged 15 who achieved level 2 and above in key fields (reading, mathematics, natural sciences) according to the PISA scale, percent
UNIT_MEASURE: "Percent (%)"
CONTACT_ORGANISATION: "Ukrainian Center for Education Quality Assessment (UCEQA)"
REC_USE_LIM: 'Data are developed once every three years. <br> 2018, 2022: Due to the military aggression of the russian federation against Ukraine, the PISA study was not conducted: <br> − in 2018 in the temporarily occupied territory of the Autonomous Republic of Crimea, the city of Sevastopol and part of the temporarily occupied territories in the Donetsk and Luhansk regions; <br> − in 2022 in seven regions (Dnipropetrovsk, Donetsk, Kharkiv, Luhansk, Zaporizhzhya, Kherson, Mykolaiv), as well as the Autonomous Republic of Crimea and the city of Sevastopol.'
