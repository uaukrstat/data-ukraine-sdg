SDG_GOAL: 16 Peace, justice and strong institutions
SDG_TARGET: 16.6 Ensuring equal access of the population to legal aid
SDG_INDICATOR: 16.6.2 Level of awareness of the possibility of receiving free legal aid, percent
UNIT_MEASURE: Percentage (%)
CONTACT_ORGANISATION: "Coordination Centre for Legal Aid Provision"
REC_USE_LIM: 2016, 2018, 2020 - Data are based on the results of the nationwide survey "What Ukrainians know and think about people’s rights", which was conducted once every two years starting in 2016 by the Foundation "Democratic Initiatives" named after Ilya Kucheriv at the initiative the United Nations Development Program (UNDP) in Ukraine with the support of the Danish Ministry of Foreign Affairs in partnership with the Center for Human Rights ZMINA.<br>2022 - The research, planned for 2022, was conducted in 2023 due to the full-scale invasion of the russian federation against Ukraine.<br>Data were not collected.<br>2016 — data by age and by level of income were not collected.<br>2018 — data by level of income were not collected.<br>2020 — data by age, gender, type of residence, level of income, and regions were not collected.