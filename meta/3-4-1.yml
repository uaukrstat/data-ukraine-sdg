SDG_GOAL: 3 Healthy lives and well-being
SDG_TARGET: 3.4 Ending the HIV/AIDS and tuberculosis epidemics, including through the use of innovative practices and treatments
SDG_INDICATOR: 3.4.1 Number of patients diagnosed with HIV/AIDS for the first time, per 100,000 population
UNIT_MEASURE: Per 100,000 population
CONTACT_ORGANISATION: "State Institution \"Public Health Center of the Ministry of Health of Ukraine\" (Public Health Center of the MoH of Ukraine)"
REC_USE_LIM: Excluding the number of children diagnosed with HIV at the stage of confirmation. <br>Data on the resident population of Ukraine (by estimate) as of January 1, 2022 were used in the calculation.