REC_USE_LIM: 'for 2015 − reporting of the Ministry for Communities and Territories Development of Ukraine, whose legal successor is the Ministry for Communities, Territories and Infrastructure Development of Ukraine;
for 2016-2023 − National report on the quality of drinking water and the state of drinking water supply and drainage in Ukraine (next - National Report) in the corresponding year. <br>Urban: Data for 2015-2019 are provided for the security of urban settlements. Data for 2020-2023 are provided for the security of the urban population (including the population of urban-type settlements). <br>Rural: Data for 2015-2019 are provided for the security of rural settlements. Data for 2020-2023 are provided for the security of the rural population. <br>2015-2020: Data are provided excluding information from the temporarily occupied territory of Luhansk and Donetsk regions. <br>2021-2022: Data are provided excluding information from Volyn, Zaporizhzhya, Luhansk, Kherson regions and the temporarily occupied part of Donetsk region. <br>2023: Data are provided excluding information from Luhansk region and the temporarily occupied part of Donetsk region.'
