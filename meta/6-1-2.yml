SDG_GOAL: 6 Clean water and sanitation
SDG_TARGET: 6.1 Ensuring access of the population to centralized drinking water supply services of adequate quality
SDG_INDICATOR: '6.1.2 Share of the population with access to centralized water supply, percent: urban population, rural population'
