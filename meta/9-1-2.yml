SDG_GOAL: 9 Industry, innovation and infrastructure
SDG_TARGET: 9.1 Promoting opportunities for scientists (researchers) and entrepreneurs to realize their scientific and innovative potential
SDG_INDICATOR: 9.1.2 Share of the volume of sold innovative products (goods, services) in the total volume of sold products (goods, services) of enterprises, percent
UNIT_MEASURE: "Percent (%)"
CONTACT_ORGANISATION: "State Statistics Service of Ukraine (SSSU)"
REC_USE_LIM: "2016: Data have been developed since 2018. <br> Symbol (с) – data are not released in order to comply with the requirements of Ukraine`s law on official statistics regarding the provision of guarantees of the state statistics bodies on statistical confidentiality. <br> Data are provided for legal entities with an average number of employees of 10 or more.<br>Data are developed once every two years"
