SDG_GOAL: 16 Peace, justice and strong institutions
SDG_TARGET: 16.6 Ensuring equal access of the population to legal aid
SDG_INDICATOR: 16.6.1 Number of persons applying free legal aid, persons
UNIT_MEASURE: "Persons"
CONTACT_ORGANISATION: "Coordination Centre for Legal Aid Provision"
REC_USE_LIM: '2015: Data for 2015 are calculated from 01.07.2015 in connection with the establishment of local centers for the provision of free secondary legal aid in accordance with the order of the Ministry of Justice of Ukraine dated 10.03.2015 No. 331/5 "On the development of the system of free secondary legal aid". <br> Data on the number of people who contacted the single contact number of the free legal aid system 0-800-213-103 is currently not disaggregated by individual categories, therefore the number of such people is displayed separately and is not included in other disaggregated indicators. <br> Type of residence: Data are not available.<br> Number of registered client requests for free legal assistance: Number of registered client appeals is greater than the number of persons applying free legal aid services, since one person may receive relevant services on various issues multiple times during the year. <br> Number of registered client requests for free legal assistance by regions: Disaggregated data by region are provided on the number of registered client applications, since a person may change their place of residence during the year (this especially applies to internally displaced persons, the most frequent occurrence was in 2022).'
