SDG_GOAL: 16 Peace, justice and strong institutions
SDG_TARGET: 16.6 Ensuring equal access of the population to legal aid
SDG_INDICATOR: 16.6.1 Number of persons applying free legal aid, persons
CONTACT_ORGANISATION: "Coordination Centre for Legal Aid Provision"
REC_USE_LIM: 2015 - Data for 2015 are calculated from 01.07.2015 in connection with the establishment of local centers for the provision of free secondary legal aid in accordance with the order of the Ministry of Justice of Ukraine dated 10.03.2015 No. 331/5 "On the development of the system of free secondary legal aid". <br>Data on the number of people who contacted the single contact number of the free legal aid system 0-800-213-103 is currently not disaggregated by individual categories, therefore the number of such people is displayed separately and is not included in other disaggregated indicators.<br>by type of place of residence - Data are not available.<br>Number of registered applications - The number of registered client applications is greater than the number of people who apply for free legal aid services, since one person can repeatedly receive relevant services on various issues during the year.<br>2015 - Data for 2015 are calculated from 01.07.2015 in connection with the establishment of local centers for the provision of free secondary legal aid in accordance with the order of the Ministry of Justice of Ukraine dated 10.03.2015 No. 331/5 "On the development of the system of free secondary legal aid assistance".<br>Disaggregated data are provided by region on the number of registered client applications, since a person may change their place of residence during the year (this especially applies to IDPs, the most was observed in 2022).