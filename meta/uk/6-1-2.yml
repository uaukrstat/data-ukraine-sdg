REC_USE_LIM: "Джерело даних: <br> за 2015 рік – звітність Мінрегіону, правонаступником якого є Мінрозвитку; <br> за 2016-2023 роки – Національна доповідь про якість питної води та стан питного водопостачання та водовідведення в Україні у відповідному році. <br> Міська місцевість: Дані за 2015–2019 роки наведено щодо забезпеченості міських населених пунктів. Дані за 2020–2023 роки наведено щодо забезпеченості міського населення (включаючи населення селищ міського типу). <br> Сільська місцевість: Дані за 2015–2019 роки наведено щодо забезпеченості сільських населених пунктів. Дані за 2020–2023 роки наведено щодо забезпеченості сільського населення. <br> 2015–2020 роки: Дані наведено без урахування інформації тимчасово окупованої території Луганської і Донецької областей. <br> 2021–2022 роки: Дані наведено без урахування інформації Волинської, Запорізької, Луганської, Херсонської областей та тимчасово окупованої частини Донецької області. <br> 2023 рік: Дані наведено без урахування інформації Луганської області та тимчасово окупованої частини Донецької області."
