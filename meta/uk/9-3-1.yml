REC_USE_LIM: "2022–2023 роки: Дані можуть бути уточнені. <br> 2022–2023 роки, трубопровідний, авіаційний транспорт: (к) Дані не оприлюднюються з метою виконання вимог Закону України \"Про офіційну статистику\" щодо забезпечення гарантій органів державної статистики щодо статистичної конфіденційності. <br> 2024 рік: Оприлюднення інформації  буде поновлено після завершення встановленого Законом України \"Про захист інтересів суб’єктів подання звітності та інших документів у період дії воєнного стану або стану війни\" терміну для подання статистичної та фінансової звітності. <br> Залізничний транспорт: За даними Акціонерного товариства \"Українська залізниця\". <br> Авіаційний транспорт: За даними Державної авіаційної служби України."
