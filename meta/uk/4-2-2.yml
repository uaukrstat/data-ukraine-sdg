SDG_GOAL: 4 Якісна освіта
SDG_TARGET: 4.2 Забезпечення доступу дітей та підлітків до якісної загальної середньої освіти
SDG_INDICATOR: 4.2.2 Частка здобувачів загальної середньої освіти віком 15 років, які досягли рівня 2 і вище у ключових галузях (читання, математика, природничо-наукові дисципліни) за шкалою PISA, відсотків
UNIT_MEASURE: Відсотків (%)
CONTACT_ORGANISATION: "Український центр оцінювання якості освіти (УЦОЯО)"
REC_USE_LIM: 'Через військову агресію російської федерації проти України дослідження PISA не було проведено:
− у 2018 році на тимчасово окупованій території Автономної Республіки Крим, м. Севастополя та частині тимчасово окупованих територій у Донецькій та Луганській областях;
− у 2022 році у семи областях (Дніпропетровська, Донецька, Харківська, Луганська, Запорізька, Херсонська, Миколаївська), а також Автономній Республіці Крим і місті Севастополі.'