CONTACT_ORGANISATION: Міністерство захисту довкілля та природних ресурсів України (Міндовкілля)
REC_USE_LIM: 'Підготовлено за узагальненими даними державного обліку водокористування за формою № 2ТП–водгосп (річна). <br> 2015–2021 роки: Дані державного обліку водокористування за 2015–2021 роки надаються без урахування даних водокористувачів тимчасово окупованих територій у Донецькій та Луганській областях, Автономній Республіці Крим та місті Севастополі.<br>2022–2024 роки: Дані державного обліку водокористування за 2022–2024 роки надаються з урахуванням подання звітності відповідно до норм Закону України "Про захист інтересів суб’єктів подання звітності та інших документів у період дії воєнного стану або стану війни", а також без водокористувачів тимчасово окупованої російською федерацією території України.'
