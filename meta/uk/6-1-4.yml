CONTACT_ORGANISATION: "Міністерство розвитку громад та територій України (Мінрозвитку)"
REC_USE_LIM: 'за 2015 рік − звітність Мінрегіону, правонаступником якого є Мінрозвитку;
    за 2016-2023 роки − Національна доповідь про якість питної води та стан питного водопостачання та водовідведення в України (далі − Нацдоповідь) у відповідному році. <br>Міські населені пункти: Дані за 2015-2019 роки наведено щодо забезпеченості міських населених пунктів. Дані за 2020-2023 роки наведено щодо забезпеченості міського населення (включаючи населення селищ міського типу). <br>Сільські населені пункти: Дані за 2015-2019 роки наведено щодо забезпеченості сільських населених пунктів. Дані за 2020-2023 роки наведено щодо забезпеченості сільського населення. <br>За типом місцевості проживання: Без урахування тимчасово окупованої території Автономної Республіки Крим та м. Севастополя. У розрахунку використано дані про чисельність наявного населення України (за оцінкою). <br>2015-2020 роки: Дані наведено без урахування інформації тимчасово окупованої території Луганської і Донецької областей. <br>2021 рік: Дані наведено без урахування інформації Волинської, Запорізької, Луганської, Херсонської областей та тимчасово окупованої частини Донецької області. <br>2022-2023 роки: Дані наведено без урахування інформації Луганської області (відповідно до інформації Нацдоповіді за 2023 рік). <br>Міська і сільська місцевості 2022 рік: У розрахунку використано дані про чисельність наявного населення України (за оцінкою) станом на 01.01.2022.'
