SDG_GOAL: 11 Сталий розвиток міст і громад
SDG_TARGET: 11.1 Забезпечення доступу населення до житла належної якості, передусім для тих, хто втратив житло внаслідок збройної агресії Російської Федерації проти України
SDG_INDICATOR: 11.1.6 Частка заявників, які використали отриману компенсацію за житло, знищене внаслідок збройної агресії Російської Федерації проти України, у загальній кількості заявників, щодо яких прийнято позитивне рішення щодо надання компенсації за знищене житло з використанням електронної публічної послуги "єВідновлення", відсотків(індикатор ЦСР 11.1.6)
