SDG_GOAL: 4 Якісна освіта
SDG_TARGET: 4.6 Створення у закладах освіти сучасного інклюзивного освітнього середовища
SDG_INDICATOR: 4.6.1 Частка закладів дошкільної, загальної середньої та позашкільної освіти, які мають доступ до високошвидкісного Інтернету, відсотків
UNIT_MEASURE: "Відсотків (%)"
CONTACT_ORGANISATION: "Державна наукова установа \"Інститут освітньої аналітики\" (ДНУ \"ІОА\")"
REC_USE_LIM: "Заклади дошкільної освіти з широкосмуговим проводовим швидкісним (більше 30 Мбіт/с) доступом до мережі Інтернет, заклади дошкільної освіти зі швидкісним (більше 30 Мбіт/с) безпроводовим доступом до мережі Інтернет, заклади дошкільної освіти зі швидкісним (більше 30 Мбіт/с) проводовим або безпроводовим доступом до мережі Інтернет: Дані розробляються з 2022 року. <br> Заклади загальної середньої освіти з широкосмуговим проводовим швидкісним  (більше 30 Мбіт/с) доступом до мережі Інтернет, заклади загальної середньої освіти зі швидкісним (більше 30 Мбіт/с) безпроводовим доступом до мережі Інтернет: Дані розробляються з 2018 року. <br> Заклади загальної середньої освіти зі швидкісним (більше 30 Мбіт/с) проводовим або безпроводовим доступом до мережі Інтернет: Дані розробляються з 2024 року. <br> Заклади позашкільної освіти: Дані не розраховувались у зв'язку з відсутністю інформації щодо підключення закладів позашкільної освіти до мережі Інтернет у формі звітності № 1-ПЗ \"Зведений звіт позашкільних навчальних закладів\"."
