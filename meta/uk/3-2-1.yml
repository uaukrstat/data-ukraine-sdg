SDG_GOAL: 3 Міцне здоров’я і благополуччя
SDG_TARGET: 3.2 Зниження рівня материнської смертності
SDG_INDICATOR: 3.2.1 Коефіцієнт материнської смертності, на 100 000 живонароджених
UNIT_MEASURE: На 100 000 живонароджених
CONTACT_ORGANISATION: "Державна служба статистики України (Держстат)"
REC_USE_LIM: Без урахування тимчасово окупованої території Автономної Республіки Крим, м. Севастополя та частини тимчасово окупованих територій у Донецькій та Луганській областях. <br> Ураховуючи ситуацію, що склалася через військову агресію російської федерації проти України, формування офіційної державної статистичної інформації щодо смертності та народжуваності призупинено, починаючи з 2022 року, у зв'язку з неможливістю отримання у повному обсязі адміністративних даних, які є джерелом формування відповідної статистичної інформації.