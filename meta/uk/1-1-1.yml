REC_USE_LIM: '2022-2024 роки: Відповідно до норм Закону України "Про захист інтересів суб’єктів подання звітності та інших документів у період дії воєнного стану або стану війни", у зв’язку зі збройною агресією росії проти України, починаючи з лютого 2022 року, органи державної статистики не проводять вибіркові обстеження населення (домогосподарств), унаслідок чого не мають можливості отримувати інформацію за їх результатами. Відповідно, дані за 2022–2024 роки не можуть бути розраховані Інститутом демографії НАН України.'