SDG_GOAL: 16 Мир, справедливість та сильні інститути
SDG_TARGET: 16.6 Забезпечення рівного доступу населення до правничої допомоги
SDG_INDICATOR: 16.6.1 Кількість осіб, які звертаються за безоплатною правничою допомогою, осіб
UNIT_MEASURE: "Осіб"
CONTACT_ORGANISATION: "Координаційний центр з надання правничої допомоги"
REC_USE_LIM: 2015 - Дані за 2015 рік обраховуються з 01.07.2015 у зв’язку з утворенням місцевих центрів з надання безоплатної вторинної правової допомоги відповідно до наказу Міністерства юстиції України від 10.03.2015 № 331/5 "Про питання розвитку системи безоплатної вторинної правової допомоги". <br>Дані щодо кількості осіб, які звернулися на єдиний контактний номер системи надання безоплатної правничої допомоги 0-800-213-103, на теперішній час не мають дезагрегації за окремими категоріями, тому кількість таких осіб відображено окремо, та не враховано в інші дезагреговані показники.<br>За типом місцевості проживання - Дані відсутні.<br>Кількість зареєстрованих звернень - Кількість зареєстрованих звернень клієнтів є більшою за кількість осіб, які звертаються за послугами безоплатної правничої допомоги, оскільки одна особа може неодноразово протягом року отримувати відповідні послуги з різних питань.<br>2015 - Дані за 2015 рік обраховуються з 01.07.2015 у зв’язку з утворенням місцевих центрів з надання безоплатної вторинної правової допомоги відповідно до наказу Міністерства юстиції України від 10.03.2015 № 331/5 "Про питання розвитку системи безоплатної вторинної правової допомоги".<br>Наведено дезагреговані дані в розрізі областей щодо кількості зареєстрованих звернень клієнтів, оскільки особа протягом року може змінювати місце перебування (особливо це стосується ВПО, найбільше прослідковувалося у 2022 році).