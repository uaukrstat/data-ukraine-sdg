SDG_GOAL: 5 Гендерна рівність
SDG_TARGET: 5.2 Зниження рівня насильства за ознакою статі та домашнього насильства, забезпечення ефективного запобігання його проявам та надання своєчасної допомоги постраждалим
SDG_INDICATOR: 5.2.5 Частка осіб, постраждалих від домашнього насильства та насильства за ознакою статі, яким надано допомогу загальними та спеціалізованими службами підтримки постраждалих, у загальній кількості осіб, які подавали відповідні звернення, відсотків
UNIT_MEASURE: "Відсотків (%)"
CONTACT_ORGANISATION: "Національна соціальна сервісна служба України (Нацсоцслужба)"
REC_USE_LIM: "2015 - 2016 роки: Дані розробляються з 2017 року. <br>Донецька область 2022, 2024 роки, Тернопільська, Хмельницька області 2023 рік: За рахунок осіб, які постраждали від домашнього насильства та насильства за ознакою статі у попередньому році, а допомога була надана у звітному році. <br>Запорізька область 2022 - 2023 роки, Луганська, Херсонська області 2022 - 2024 роки: Інформація не подавалась у зв'язку з тимчасовою окупацією території."