SDG_GOAL: 11 Сталий розвиток міст і громад
SDG_TARGET: 11.4 Підвищення стійкості населених пунктів і територіальних громад до наслідків збройної агресії Російської Федерації проти України, стихійних лих, надзвичайних ситуацій та змін клімату
SDG_INDICATOR: 11.4.7 Частка автоматизованих систем централізованого оповіщення, в яких проведено технічну модернізацію, у загальній кількості автоматизованих систем централізованого оповіщення, відсотків (індикатор ЦСР 11.4.7)
CONTACT_ORGANISATION: "ДСНС"
UNIT_MEASURE: Відсотків (%)
REC_USE_LIM: "Частка автоматизованих систем централізованого оповіщення, в яких проведено технічну модернізацію, у загальній кількості автоматизованих систем централізованого оповіщення, відсотків: За даними обласних та Київської міської державних (військових) адміністрацій. <br> за місцевими автоматизованими системами центрального оповіщення 2024: Відсоток впровадження місцевих автоматизованих системам центрального оповіщення (МАСЦО) зменшився в порівнянні з попереднім роком оскільки у 2023 році Вінницька, Київська, Тернопільська, Хмельницька та Чернігівська обласні військові адміністрації надали інформацію про впровадження МАСЦО, враховуючи системи, які не введено в експлуатацію."