REC_USE_LIM: 'Дані наведено станом на 31 грудня. <br> Для розрахунку даних використано інформацію в обсязі, наданому територіальними виборчими комісіями. Інформацію наведено з урахуванням того, що вибори депутатів Верховної Ради Автономної Республіки Крим, депутатів місцевих рад на тимчасово окупованих територіях Автономної Республіки Крим, міста Севастополя, депутатів Донецької та Луганської обласних рад та в окремих районах, містах, селищах і селах Донецької та Луганської областей не призначалися і не проводилися або встановлено неможливість проведення виборів. <br> 2024 рік: У 2024 році вибори не проводились. Дані будуть доступні протягом 3-х місяців з дня проведення чергових місцевих виборів.'
