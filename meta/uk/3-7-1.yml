SDG_GOAL: 3 Міцне здоров’я і благополуччя
SDG_TARGET: 3.7 Зниження рівня смертності внаслідок нещасних випадків на транспорті шляхом використання інноваційних практик організації реанімування, лікування та реабілітації постраждалих внаслідок таких випадків
SDG_INDICATOR: 3.7.1 Коефіцієнт смертності внаслідок транспортних нещасних випадків, на 100 000 осіб
UNIT_MEASURE: На 100 000 осіб
CONTACT_ORGANISATION: "Державна служба статистики України (Держстат)"
REC_USE_LIM: "2015-2021 роки: Без урахування тимчасово окупованої території Автономної Республіки Крим, м. Севастополя та даних по Донецькій та Луганській областях. <br>2022-2024 роки: Ураховуючи ситуацію, що склалася через військову агресію російської федерації проти України, формування офіційної державної статистичної інформації щодо смертності призупинено, починаючи з 2022 року, у зв'язку з неможливістю отримання у повному обсязі адміністративних даних, які є джерелом формування відповідної статистичної інформації."