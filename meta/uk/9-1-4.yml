SDG_GOAL: 9 Промисловість, інновації та інфраструктура
SDG_TARGET: 9.1 Сприяння можливості реалізації власного наукового та інноваційного потенціалу науковцями (дослідниками) та підприємцями
SDG_INDICATOR: 9.1.4 Кількість працівників, задіяних у виконанні наукових досліджень і розробок, на 1000 зайнятих (віком 15 років і старше), осіб
UNIT_MEASURE: "Осіб"
CONTACT_ORGANISATION: "Державна служба статистики України (Держстат)"
REC_USE_LIM: '2015–2018 роки: Для розрахунку індикатора за 2015–2018 роки використано показник "Кількість зайнятого населення за віковою групою 15–70 років". <br> 2022–2024 роки: Розрахунок індикатора не здійснювався. Починаючи з 2022 року через дію Закону України "Про захист інтересів суб’єктів подання звітності та інших документів у період дії воєнного стану або стану війни" Держстат не здійснює розрахунок (оцінку) та не поширює інформацію щодо кількості зайнятого населення.'
