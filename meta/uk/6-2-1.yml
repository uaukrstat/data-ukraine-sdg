REC_USE_LIM: 'Міське і сільське населення: Джерело даних: <br> за 2015 рік – звітність Мінрегіону, правонаступником якого є Мінрозвитку; <br> за 2016–2023 роки – Національна доповідь про якість питної води та стан питного водопостачання та водовідведення в України (далі – Нацдоповідь) у відповідному році. <br> Міське населення: Дані за 2015 рік наведено щодо забезпеченості міських населених пунктів. Дані за 2016–2023 роки наведено щодо забезпеченості міського населення (включаючи населення селищ міського типу). <br> Сільське населення: Дані за 2015 рік наведено щодо забезпеченості сільських населених пунктів. Дані за 2016–2023 роки наведено щодо забезпеченості сільського населення. <br> Вікові групи: Дезагрегування за віковими групами Мінрозвитку не здійснюється (відсутні дані у Нацдоповіді). <br> Тип місцевості проживання: Без урахування тимчасово окупованої території Автономної Республіки Крим та м. Севастополя. У розрахунку використано дані про чисельність наявного населення України (за
  оцінкою). <br> 2015–2020 роки: Дані наведено без урахування інформації тимчасово окупованої території Луганської і Донецької областей. <br> 2021 рік: Дані наведено без урахування інформації Волинської, Запорізької, Луганської, Херсонської областей та тимчасово окупованої частини Донецької області. <br>2022–2023 роки: Дані наведено без урахування інформації Луганської області (відповідно до інформації Нацдоповіді за 2023 рік).'
