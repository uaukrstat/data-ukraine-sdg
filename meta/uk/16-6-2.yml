SDG_GOAL: 16 Мир, справедливість та сильні інститути
SDG_TARGET: 16.6 Забезпечення рівного доступу населення до правничої допомоги
SDG_INDICATOR: 16.6.2 Рівень обізнаності про можливість отримання безоплатної правничої допомоги, відсотків
