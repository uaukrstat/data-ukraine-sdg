REC_USE_LIM: 2016, 2018, 2020 - Дані наведено за результатами загальнонаціональних досліджень "Що українці знають і думають про права людини", які проводяться один раз на два роки починаючи з 2016 року Фондом "Демократичні ініціативи" імені Ілька Кучеріва за ініціативи Програми розвитку ООН (UNDP) в Україні за підтримки Міністерства закордонних справ Данії у партнерстві з Центром прав людини ZMINA.<br>2022 - Дослідження, заплановане на 2022 рік, проведене у 2023 році у зв'язку з повномасштабим вторгненням російської федерації проти України.<br>Дані не збирались.<br>2016 рік — дані за віком та рівнем доходу не збирались.<br>2018 рік — дані за рівнем доходу не збирались.<br>2020 рік — дані за віком, статтю, типом місцевості проживання, рівнем доходу, регіонами не збирались.