SDG_GOAL: 16 Мир, справедливість та сильні інститути
SDG_TARGET: 16.2 Очищення території від вибухонебезпечних предметів, які з’явилися внаслідок збройної агресії Російської Федерації проти України, шляхом розмінування (гуманітарного розмінування)
SDG_INDICATOR: 16.2.1 Площа ідентифікованої за результатами нетехнічного обстеження імовірно забрудненої території, кв. кілометрів (гектарів)
UNIT_MEASURE: "Кв. кілометрів (гектарів)"
CONTACT_ORGANISATION: "Міністерство оборони України (Міноборони)"
REC_USE_LIM: 2015-2021 - Дані розробляються з 2022 року.<br>2022-2024 - Відсутні дані вказують на те, що зазначені території не були забрудненими вибухонебезпечними предметами, за винятком територій Донецької та Луганської областей, оскільки на момент надання даних ці території є окупованими або знаходяться у зонах ведення активних бойових дій.