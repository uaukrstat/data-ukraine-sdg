sdg_ukrstat: Цілі сталого розвитку на вебсайті Держстату
frontpage_intro_banner_body: Цілі сталого розвитку (ЦСР) є універсальним закликом до дій, щоб покінчити з бідністю, захистити планету та поліпшити життя та перспективи кожного, в усьому світі. 17 Цілей були прийняті всіма державами-членами ООН у 2015 році в рамках порядку денного сталого розвитку 2030.У зв'язку з оновленням національної системи ЦСР та переліку індикаторів, затверджених Кабінетом Міністрів України у 2024 році, Відкриту платформу ЦСР в Україні було модернізовано.
Модернізація платформи відбулася за підтримки Програми розвитку ООН (ПРООН) в Україні у межах проєкту «Підтримка інклюзивного відновлення для забезпечення стійкості та безпеки людей в Україні», що реалізується за фінансування уряду Японії. Експертну підтримку надали у межах «Проєкту підтримки Дія», який ПРООН втілює за фінансування уряду Швеції.
Модернізація платформи стала важливим кроком для забезпечення прозорого та зручного доступу до даних про досягнення Цілей сталого розвитку в Україні, особливо в умовах війни та відновлення країни.
